<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GROUP 1 — Research Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:       #05060f;
            --surface:  #0c0e1e;
            --panel:    #10132a;
            --border:   rgba(255,255,255,0.07);
            --accent:   #4d7fff;
            --accent2:  #a78bfa;
            --text:     #e8eaf6;
            --muted:    #6b7280;
            --glow:     rgba(77,127,255,0.2);
        }

        html, body { height: 100%; overflow: hidden; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
        }

        /* === NOISE OVERLAY === */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            opacity: 0.35;
        }

        /* === SIDEBAR === */
        .sidebar {
            width: 100vw;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 48px 56px;
            transition: width 0.55s cubic-bezier(0.77,0,0.18,1);
            position: relative;
            z-index: 10;
            flex-shrink: 0;
            border-right: 1px solid transparent;
        }
        .sidebar.expanded {
            width: 320px;
            border-right-color: var(--border);
        }

        /* Subtle corner accent */
        .sidebar::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 2px; height: 60px;
            background: linear-gradient(to bottom, var(--accent), transparent);
        }

        .brand {
            margin-bottom: 48px;
        }
        .brand-label {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.22em;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .brand-title {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 900;
            line-height: 1;
            color: var(--text);
            letter-spacing: -0.02em;
        }

        .nav-divider {
            width: 100%;
            height: 1px;
            background: var(--border);
            margin-bottom: 32px;
        }

        .category {
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 4px;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s, color 0.2s;
            color: var(--muted);
            position: relative;
            white-space: nowrap;
            overflow: hidden;
        }
        .category .arrow {
            font-size: 10px;
            transition: transform 0.3s;
            opacity: 0.5;
        }
        .category:hover {
            background: rgba(255,255,255,0.04);
            color: var(--text);
        }
        .category.highlighted {
            background: var(--glow);
            color: var(--accent);
            border: 1px solid rgba(94,106,255,0.3);
        }
        .category.highlighted .arrow {
            transform: rotate(90deg);
            opacity: 1;
        }
        /* typewriter text span inside .category.highlighted */
        .category.highlighted .label-text,
        .sub-item.highlighted .label-text,
        .dropdown-item.highlighted .label-text {
            display: inline-block;
        }

        /* === MAIN PANEL === */
        .main {
            flex: 1;
            background: var(--surface);
            display: none;
            position: relative;
            z-index: 5;
            overflow: hidden;
        }
        .main.visible { display: flex; flex-direction: column; }

        /* top bar */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 28px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .breadcrumb {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.15em;
            color: var(--muted);
            text-transform: uppercase;
        }
        .breadcrumb span { color: var(--accent); }

        .close-btn {
            width: 32px; height: 32px;
            border-radius: 50%;
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            font-size: 16px;
            color: var(--muted);
            transition: border-color 0.2s, color 0.2s, background 0.2s;
        }
        .close-btn:hover {
            border-color: #ff4d6d;
            color: #ff4d6d;
            background: rgba(255,77,109,0.08);
        }

        .content {
            flex: 1;
            padding: 36px 32px;
            overflow-y: auto;
            transition: opacity 0.3s;
        }
        .content::-webkit-scrollbar { width: 4px; }
        .content::-webkit-scrollbar-track { background: transparent; }
        .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .placeholder a.doc-link {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid rgba(77,127,255,0.3);
            transition: color 0.2s, border-color 0.2s;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.08em;
        }
        .placeholder a.doc-link:hover {
            color: #7aa8ff;
            border-color: rgba(77,127,255,0.7);
        }

        /* === SECTION TITLE === */
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text);
        }
        .section-sub {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 0.12em;
            margin-bottom: 32px;
        }

        /* === SUB ITEMS === */
        .sub-item {
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
        }
        .sub-item:hover {
            background: rgba(255,255,255,0.03);
            border-color: rgba(255,255,255,0.12);
            color: var(--text);
        }
        .sub-item.highlighted {
            background: var(--glow);
            border-color: rgba(94,106,255,0.4);
            color: var(--accent);
        }
        .sub-item .arrow { font-size: 9px; transition: transform 0.3s; }
        .sub-item.highlighted .arrow { transform: rotate(90deg); }

        /* === DROPDOWN === */
        .dropdown {
            display: none;
            margin-bottom: 12px;
            padding-left: 16px;
        }
        .dropdown-item {
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            cursor: pointer;
            padding: 9px 14px;
            border-radius: 6px;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s, color 0.2s;
            white-space: nowrap;
            overflow: hidden;
        }
        .dropdown-item::before {
            content: '─';
            font-size: 10px;
            opacity: 0.3;
        }
        .dropdown-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
        .dropdown-item.highlighted {
            background: var(--glow);
            color: var(--accent2);
        }

        /* === PLACEHOLDER === */
        .placeholder {
            display: none;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            padding: 8px 16px 14px;
            letter-spacing: 0.08em;
            border-left: 1px solid var(--border);
            margin: 4px 0 10px 16px;
        }

        /* === MEMBER CARD === */
        .member-card {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 28px;
            align-items: start;
        }
        .member-avatar-wrap {
            position: relative;
        }
        .member-avatar-wrap img {
            width: 120px; height: 120px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            border: 2px solid var(--border);
        }
        .avatar-ring {
            position: absolute; inset: -5px;
            border-radius: 50%;
            border: 1.5px solid var(--accent);
            opacity: 0.4;
            animation: spin 8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .member-info-grid { display: flex; flex-direction: column; gap: 10px; }
        .member-name {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
        }
        .member-role {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.18em;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 16px;
        }
        .info-row {
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(255,255,255,0.02);
        }
        .info-label {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
        }
        .info-value {
            font-size: 14px;
            color: var(--text);
            line-height: 1.5;
        }
        .rating-badge {
            display: inline-block;
            background: var(--glow);
            border: 1px solid rgba(94,106,255,0.3);
            color: var(--accent);
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            padding: 4px 12px;
            border-radius: 20px;
            letter-spacing: 0.08em;
        }

        /* === CONFIRMATION MODAL === */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 1000;
            background: rgba(5,6,15,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(6px);
        }
        .modal-overlay.visible { display: flex; }
        .modal {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 32px 36px;
            max-width: 360px;
            width: 90%;
            text-align: center;
            box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
        }
        .modal p {
            font-size: 15px;
            color: var(--muted);
            margin-bottom: 24px;
            line-height: 1.6;
        }
        .modal-btns { display: flex; gap: 10px; justify-content: center; }
        .btn {
            padding: 9px 22px;
            border-radius: 7px;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .btn-primary:hover { background: #4a56e8; }
        .btn-ghost {
            background: transparent;
            border-color: var(--border);
            color: var(--muted);
        }
        .btn-ghost:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }

        /* === MUTE BUTTON === */
        .mute-btn {
            position: fixed;
            bottom: 22px; right: 22px;
            z-index: 500;
            width: 42px; height: 42px;
            border-radius: 50%;
            background: var(--panel);
            border: 1px solid var(--border);
            color: var(--muted);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: border-color 0.2s, color 0.2s, background 0.2s, transform 0.15s;
        }
        .mute-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--glow);
            transform: scale(1.08);
        }
        .mute-btn.muted { color: #ff4d6d; border-color: rgba(255,77,109,0.35); }
        .mute-bars { display: flex; gap: 2px; align-items: flex-end; height: 14px; }
        .mute-bars .bar {
            width: 3px; border-radius: 2px; background: currentColor;
            animation: eq var(--d, 0.8s) ease-in-out infinite alternate;
        }
        .mute-bars .bar:nth-child(1) { height: 6px;  --d: 0.7s; }
        .mute-bars .bar:nth-child(2) { height: 12px; --d: 0.5s; }
        .mute-bars .bar:nth-child(3) { height: 9px;  --d: 0.9s; }
        .mute-btn.muted .bar { animation: none; height: 3px !important; opacity: 0.35; }
        @keyframes eq {
            from { transform: scaleY(0.3); }
            to   { transform: scaleY(1); }
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="brand">
            <div class="brand-label">Research Hub</div>
            <div class="brand-title">GROUP<br>ONE</div>
        </div>
        <div class="nav-divider"></div>

        <div class="category" id="members" onclick="toggleCategory('members')">
            <span class="arrow">▶</span>
            <span class="label-text">Members</span>
        </div>
        <div class="category" id="word" onclick="toggleCategory('word')">
            <span class="arrow">▶</span>
            <span class="label-text">Word</span>
        </div>
        <div class="category" id="excel" onclick="toggleCategory('excel')">
            <span class="arrow">▶</span>
            <span class="label-text">Excel</span>
        </div>
        <div class="category" id="powerpoint" onclick="toggleCategory('powerpoint')">
            <span class="arrow">▶</span>
            <span class="label-text">PowerPoint</span>
        </div>
    </div>

    <div class="main" id="main">
        <div class="top-bar">
            <div class="breadcrumb">GROUP ONE &nbsp;/&nbsp; <span id="breadcrumb-label">—</span></div>
            <div class="close-btn" onclick="handleClose()">✕</div>
        </div>
        <div class="content" id="content"></div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <p>Open this member's profile?</p>
            <div class="modal-btns">
                <button class="btn btn-primary" onclick="confirmOpen()">View Profile</button>
                <button class="btn btn-ghost" onclick="cancelOpen()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Mute toggle -->
    <button class="mute-btn" id="muteBtn" onclick="toggleMute()" title="Toggle music">
        <div class="mute-bars">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
    </button>

<script>
    // ── AUDIO ENGINE ─────────────────────────────────────────────────
    let audioCtx = null;
    let musicGain = null;
    let sfxGain = null;
    let musicPlaying = false;
    let isMuted = false;
    let schedulerTimer = null;

    // B major chord tones (Hz) — Emaj7, Bmaj7, B, F# pattern
    const CHORDS = [
        [164.81, 207.65, 246.94, 311.13], // Emaj7 — E4 G#4 B4 D#5
        [123.47, 155.56, 185.00, 246.94], // Bmaj7 — B3 D#4 F#4 B4
        [123.47, 155.56, 185.00, 233.08], // B     — B3 D#4 F#4 A#4
        [92.50,  123.47, 185.00, 246.94]  // F#    — F#3 B3 F#4 B4
    ];
    const BPM = 84;
    const BEAT = 60 / BPM;        // seconds per beat
    const BAR  = BEAT * 4;        // 4/4
    const PATTERN_BARS = 4;       // chord changes every bar

    let nextNoteTime = 0;
    let currentBar   = 0;
    let currentBeat  = 0;

    function getCtx() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            musicGain = audioCtx.createGain();
            musicGain.gain.value = 0.18;
            musicGain.connect(audioCtx.destination);
            sfxGain = audioCtx.createGain();
            sfxGain.gain.value = 0.35;
            sfxGain.connect(audioCtx.destination);
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
        return audioCtx;
    }

    // ── DRUM SYNTHESIS ───────────────────────────────────────────────
    function kick(ctx, t) {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.frequency.setValueAtTime(160, t);
        osc.frequency.exponentialRampToValueAtTime(40, t + 0.15);
        gain.gain.setValueAtTime(1.2, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
        osc.connect(gain); gain.connect(musicGain);
        osc.start(t); osc.stop(t + 0.35);
    }

    function snare(ctx, t) {
        // noise burst
        const bufLen = ctx.sampleRate * 0.12;
        const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1);
        const src = ctx.createBufferSource();
        src.buffer = buf;
        const filter = ctx.createBiquadFilter();
        filter.type = 'bandpass'; filter.frequency.value = 1800; filter.Q.value = 0.7;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.55, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
        src.connect(filter); filter.connect(gain); gain.connect(musicGain);
        src.start(t); src.stop(t + 0.18);
    }

    function hihat(ctx, t, open = false) {
        const bufLen = ctx.sampleRate * (open ? 0.18 : 0.05);
        const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1);
        const src = ctx.createBufferSource();
        src.buffer = buf;
        const filter = ctx.createBiquadFilter();
        filter.type = 'highpass'; filter.frequency.value = 7000;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.22, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + (open ? 0.18 : 0.05));
        src.connect(filter); filter.connect(gain); gain.connect(musicGain);
        src.start(t); src.stop(t + (open ? 0.18 : 0.05));
    }

    // ── CHORD STRUM ──────────────────────────────────────────────────
    function strum(ctx, chord, t, vol = 0.07) {
        chord.forEach((freq, i) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.value = freq;
            const strumOffset = i * 0.018;
            gain.gain.setValueAtTime(0, t + strumOffset);
            gain.gain.linearRampToValueAtTime(vol, t + strumOffset + 0.02);
            gain.gain.setTargetAtTime(vol * 0.3, t + strumOffset + 0.1, 0.15);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.75);
            osc.connect(gain); gain.connect(musicGain);
            osc.start(t + strumOffset); osc.stop(t + 0.8);
        });
    }

    // ── BASSLINE ─────────────────────────────────────────────────────
    // Root notes of each chord, one octave down
    const BASS_NOTES = [41.20, 30.87, 30.87, 23.12]; // E2, B1, B1, F#1
    function bass(ctx, note, t) {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.value = note * 2; // bump up one octave for clarity
        const filter = ctx.createBiquadFilter();
        filter.type = 'lowpass'; filter.frequency.value = 320;
        gain.gain.setValueAtTime(0.45, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + BEAT * 0.85);
        osc.connect(filter); filter.connect(gain); gain.connect(musicGain);
        osc.start(t); osc.stop(t + BEAT);
    }

    // ── SCHEDULER ────────────────────────────────────────────────────
    function scheduleBeat(ctx, t, bar, beat) {
        const chordIdx = bar % PATTERN_BARS;
        const chord = CHORDS[chordIdx];

        // Kick: beats 1 and 3 (indices 0, 2), plus a weak hit on the "and" of 2
        if (beat === 0 || beat === 2) kick(ctx, t);
        if (beat === 1) {
            // soft kick on the "and" of beat 2 (offset half a beat)
            kick(ctx, t + BEAT * 0.5);
        }

        // Snare: beats 2 and 4
        if (beat === 1 || beat === 3) snare(ctx, t);

        // Hi-hat: every 8th note
        hihat(ctx, t, beat === 3);                  // open on beat 4
        hihat(ctx, t + BEAT * 0.5);                 // off-beat

        // Strum on beat 1 of each bar; ghost strum on beat 3
        if (beat === 0) strum(ctx, chord, t, 0.08);
        if (beat === 2) strum(ctx, chord, t, 0.045);

        // Bassline on every beat 1 and 3
        if (beat === 0 || beat === 2) bass(ctx, BASS_NOTES[chordIdx], t);
    }

    function scheduleAhead() {
        const ctx = getCtx();
        const lookAhead = 0.1; // seconds
        while (nextNoteTime < ctx.currentTime + lookAhead) {
            scheduleBeat(ctx, nextNoteTime, currentBar, currentBeat);
            nextNoteTime += BEAT;
            currentBeat++;
            if (currentBeat >= 4) { currentBeat = 0; currentBar++; }
        }
    }

    function startMusic() {
        if (musicPlaying) return;
        const ctx = getCtx();
        musicPlaying = true;
        nextNoteTime = ctx.currentTime + 0.1;
        currentBeat = 0; currentBar = 0;
        schedulerTimer = setInterval(scheduleAhead, 25);
    }

    function stopMusic() {
        clearInterval(schedulerTimer);
        schedulerTimer = null;
        musicPlaying = false;
    }

    function toggleMute() {
        const ctx = getCtx();
        isMuted = !isMuted;
        const btn = document.getElementById('muteBtn');
        if (isMuted) {
            musicGain.gain.setTargetAtTime(0, ctx.currentTime, 0.2);
            btn.classList.add('muted');
        } else {
            musicGain.gain.setTargetAtTime(0.18, ctx.currentTime, 0.2);
            btn.classList.remove('muted');
        }
    }

    // SFX — synthesized, no files needed
    function sfxClick() {
        const ctx = getCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(520, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(280, ctx.currentTime + 0.08);
        gain.gain.setValueAtTime(0.5, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
        osc.connect(gain); gain.connect(sfxGain);
        osc.start(); osc.stop(ctx.currentTime + 0.12);
    }

    function sfxOpen() {
        const ctx = getCtx();
        [0, 0.06, 0.12].forEach((t, i) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.value = [440, 550, 660][i];
            gain.gain.setValueAtTime(0, ctx.currentTime + t);
            gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + t + 0.03);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.15);
            osc.connect(gain); gain.connect(sfxGain);
            osc.start(ctx.currentTime + t);
            osc.stop(ctx.currentTime + t + 0.15);
        });
    }

    function sfxClose() {
        const ctx = getCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(400, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(180, ctx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
        osc.connect(gain); gain.connect(sfxGain);
        osc.start(); osc.stop(ctx.currentTime + 0.15);
    }

    function sfxHover() {
        const ctx = getCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = 680;
        gain.gain.setValueAtTime(0.12, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
        osc.connect(gain); gain.connect(sfxGain);
        osc.start(); osc.stop(ctx.currentTime + 0.06);
    }

    function sfxModal() {
        const ctx = getCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(300, ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(500, ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.25, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
        osc.connect(gain); gain.connect(sfxGain);
        osc.start(); osc.stop(ctx.currentTime + 0.2);
    }

    // Start music on first interaction
    document.addEventListener('click', () => { if (!musicPlaying) startMusic(); }, { once: true });

    let currentCategory = '';
    let pendingMember = '';

    // ── TYPEWRITER LOOP ──────────────────────────────────────────────
    const typewriterMap = new WeakMap(); // el → { interval, text }

    function startTypewriter(el) {
        if (typewriterMap.has(el)) return;
        const labelEl = el.querySelector('.label-text') || el;
        const fullText = labelEl.dataset.original || labelEl.textContent;
        labelEl.dataset.original = fullText;

        let i = 0;
        let phase = 'typing'; // typing | pause | erasing
        let pauseTicks = 0;

        const interval = setInterval(() => {
            if (phase === 'typing') {
                i++;
                labelEl.textContent = fullText.slice(0, i) + '█';
                if (i >= fullText.length) { phase = 'pause'; pauseTicks = 0; }
            } else if (phase === 'pause') {
                pauseTicks++;
                if (pauseTicks >= 6) phase = 'erasing';
            } else {
                i--;
                labelEl.textContent = i > 0 ? fullText.slice(0, i) + '█' : '█';
                if (i <= 0) { phase = 'typing'; i = 0; }
            }
        }, 70);

        typewriterMap.set(el, { interval, labelEl, fullText });
    }

    function stopTypewriter(el) {
        const data = typewriterMap.get(el);
        if (!data) return;
        clearInterval(data.interval);
        data.labelEl.textContent = data.fullText;
        typewriterMap.delete(el);
    }

    function attachTypewriter(el) {
        el.addEventListener('mouseenter', () => { sfxHover(); startTypewriter(el); });
        el.addEventListener('mouseleave', () => stopTypewriter(el));
    }

    // Attach to sidebar categories on load
    document.querySelectorAll('.category').forEach(attachTypewriter);

    // ── CATEGORY TOGGLE ──────────────────────────────────────────────
    function toggleCategory(cat) {
        if (document.getElementById(cat).classList.contains('highlighted')) {
            closeMain();
        } else {
            openCategory(cat);
        }
    }

    function openCategory(cat) {
        sfxOpen();
        currentCategory = cat;
        document.querySelectorAll('.category').forEach(c => {
            c.classList.remove('highlighted');
            stopTypewriter(c);
        });
        const catEl = document.getElementById(cat);
        catEl.classList.add('highlighted');
        startTypewriter(catEl);

        document.getElementById('sidebar').classList.add('expanded');
        const main = document.getElementById('main');
        main.classList.add('visible');
        document.getElementById('breadcrumb-label').textContent = catEl.querySelector('.label-text').dataset.original || cat;

        const content = document.getElementById('content');
        content.style.opacity = '0';

        setTimeout(() => {
            switch (cat) {
                case 'members':
                    content.innerHTML = `
                        <div class="section-title">Members</div>
                        <div class="section-sub">01 — TEAM ROSTER</div>
                        ${makeSubItem('Leader')}
                        <div class="dropdown"><div class="dropdown-item" onclick="confirmMember('leader')"><span class="label-text">Hannah Sophia Gabi</span></div></div>
                        ${makeSubItem('Website Maker')}
                        <div class="dropdown"><div class="dropdown-item" onclick="confirmMember('website_maker')"><span class="label-text">Jacob</span></div></div>
                        ${makeSubItem('Members')}
                        <div class="dropdown"><div class="dropdown-item" onclick="confirmMember('member')"><span class="label-text">Chase</span></div></div>
                    `;
                    break;
                case 'word':
                    content.innerHTML = `
                        <div class="section-title">Word</div>
                        <div class="section-sub">02 — DOCUMENTS</div>
                        ${makeSubItem('Research & Questionnaire')}
                        <div class="placeholder"><a href="https://docs.google.com/document/d/1NAqoKWlWu8e_W-UDxGD0O1HYbPG75ei0/edit" target="_blank" class="doc-link">Open in Google Docs &rarr;</a></div>
                    `;
                    break;
                case 'excel':
                    content.innerHTML = `
                        <div class="section-title">Excel</div>
                        <div class="section-sub">03 — SPREADSHEETS</div>
                        ${makeSubItem('Data')}
                        <div class="placeholder"><a href="https://docs.google.com/spreadsheets/d/1sIa5pDCEQSmSAqqRUFe24NgnUtrTLeW8/edit?gid=334668254#gid=334668254" target="_blank" class="doc-link">Open in Google Sheets &rarr;</a></div>
                    `;
                    break;
                case 'powerpoint':
                    content.innerHTML = `
                        <div class="section-title">PowerPoint</div>
                        <div class="section-sub">04 — PRESENTATIONS</div>
                        ${makeSubItem('PowerPoint Presentation')}
                        <div class="placeholder"><a href="https://docs.google.com/presentation/d/1qeQzrYR-gLqQucKxa-eThhm6gf5y7Oat/edit?slide=id.p1#slide=id.p1" target="_blank" class="doc-link">Open in Google Slides &rarr;</a></div>
                    `;
                    break;
            }
            content.style.opacity = '1';

            // bind sub-items & dropdown items
            content.querySelectorAll('.sub-item').forEach(el => {
                el.addEventListener('click', () => toggleSubItem(el));
                attachTypewriter(el);
            });
            content.querySelectorAll('.dropdown-item').forEach(el => {
                attachTypewriter(el);
            });
        }, 220);
    }

    function makeSubItem(label) {
        return `<div class="sub-item"><span class="arrow">▶</span><span class="label-text">${label}</span></div>`;
    }

    function toggleSubItem(el) {
        sfxClick();
        const wasHighlighted = el.classList.contains('highlighted');
        document.querySelectorAll('.sub-item').forEach(s => {
            s.classList.remove('highlighted');
            stopTypewriter(s);
        });
        const dd = el.nextElementSibling;
        document.querySelectorAll('.dropdown, .placeholder').forEach(d => d.style.display = 'none');

        if (!wasHighlighted) {
            el.classList.add('highlighted');
            startTypewriter(el);
            if (dd) dd.style.display = 'block';
        }
    }

    function confirmMember(member) {
        sfxModal();
        pendingMember = member;
        document.getElementById('modal').classList.add('visible');
    }
    function confirmOpen() {
        sfxOpen();
        document.getElementById('modal').classList.remove('visible');
        openMember(pendingMember);
        pendingMember = '';
    }
    function cancelOpen() {
        sfxClose();
        document.getElementById('modal').classList.remove('visible');
        pendingMember = '';
    }

    function openMember(member) {
        const content = document.getElementById('content');
        content.style.opacity = '0';
        setTimeout(() => {
            const data = {
                leader: {
                    name: 'Hannah Sophia Gabi',
                    role: 'Team Leader',
                    quote: '"Being alive is the biggest punishment as to being dead."',
                    helped: 'PowerPoint Presentation',
                    trivia: 'She does not study honestly.',
                    rating: '10 / 10',
                    img: 'hannah.png',
                    color: '#5e6aff'
                },
                website_maker: {
                    name: 'Jacob',
                    role: 'Website Maker',
                    quote: '"Life is not about avoiding the thunderstorms, it\'s about learning how to dance in the rain."',
                    helped: 'Website and Excel',
                    trivia: 'He is in fact Protanopic.',
                    rating: '10 / 10',
                    img: 'jacob.png',
                    color: '#a78bfa'
                },
                member: {
                    name: 'Chase',
                    role: 'Member',
                    quote: '"You either interrupt the story or you stay in the same chapter."',
                    helped: 'Questionnaire and Research',
                    trivia: 'He used to be an extrovert.',
                    rating: '9 / 10',
                    img: 'chase.png',
                    color: '#34d399'
                }
            }[member];

            content.innerHTML = `
                <div class="section-title">${data.name}</div>
                <div class="section-sub" style="margin-bottom:28px;">${data.role.toUpperCase()}</div>
                <div class="member-card">
                    <div class="member-avatar-wrap">
                        <img src="${data.img}" alt="${data.name}" onerror="this.style.background='${data.color}22';this.removeAttribute('src')">
                        <div class="avatar-ring" style="border-color:${data.color};"></div>
                    </div>
                    <div class="member-info-grid">
                        <div class="info-row">
                            <div class="info-label">Quote</div>
                            <div class="info-value" style="font-style:italic;color:#9ca3af;">${data.quote}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">Helped With</div>
                            <div class="info-value">${data.helped}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">Trivia</div>
                            <div class="info-value">${data.trivia}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">Rating</div>
                            <div class="info-value"><span class="rating-badge" style="background:${data.color}22;border-color:${data.color}55;color:${data.color};">${data.rating}</span></div>
                        </div>
                    </div>
                </div>
            `;
            content.style.opacity = '1';
        }, 200);
    }

    function handleClose() {
        if (currentCategory === 'members' && document.querySelector('.member-card')) {
            openCategory('members');
        } else {
            closeMain();
        }
    }

    function closeMain() {
        sfxClose();
        document.getElementById('sidebar').classList.remove('expanded');
        document.getElementById('main').classList.remove('visible');
        document.querySelectorAll('.category').forEach(c => {
            c.classList.remove('highlighted');
            stopTypewriter(c);
        });
        currentCategory = '';
    }
</script>
</body>
</html>
